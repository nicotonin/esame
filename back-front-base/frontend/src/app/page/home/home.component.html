<div class="category-card" *ngFor="let r of request$ | async">

  <div class="category-desc">
    {{ r.role1ID.firstName }} {{ r.role1ID.lastName }}
  </div>

  <div class="category-desc">
    {{ r.dataInizio | date:"medium"}}
  </div>

  <div class="category-desc">
    {{ r.dataFine | date:"medium"}}
  </div>

  <div class="category-desc">
    {{ r.stato }}
  </div>

  <!-- 🔵 ROLE 1 -->
  <div class="mt-2 d-flex gap-2"
       *ngIf="(isRole1$ | async) && r.stato === 'In attesa'">

    <button class="btn btn-sm btn-warning"
            (click)="editRequest(r)">
      Modifica
    </button>

    <button class="btn btn-sm btn-danger"
            (click)="deleteRequest(r.id)">
      Elimina
    </button>

  </div>

  <!-- 🟢 ROLE 2 -->
  <div class="mt-2 d-flex gap-2"
       *ngIf="(isRole2$ | async) && r.stato === 'In attesa'">

    <button class="btn btn-sm btn-success"
            (click)="approveRequest(r.id)">
      Approva
    </button>

    <button class="btn btn-sm btn-danger"
            (click)="rejectRequest(r.id)">
      Rifiuta
    </button>

  </div>

</div>
